services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fabric-qc-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: fabric-qc-dashboard
    ports:
      - "9501:8501"
    environment:
      # dashboard.py reads this via os.getenv("API_URL", ...) and
      # uses it for every /predict, /predict/annotated, and
      # /predict/batch call. "api" resolves via Docker's internal
      # DNS to the api service's container.
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped